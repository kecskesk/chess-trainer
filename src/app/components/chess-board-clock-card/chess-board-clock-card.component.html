<div class="clock-card panel-card panel-card--wide">
  <div class="clock-card-header">
    <h3 class="section-title">{{uiText.clock.sectionTitle}}</h3>
    <div class="clock-brand" [attr.aria-label]="uiText.clock.brandAriaLabel">
      <img class="clock-brand__logo" src="horse.svg" [attr.alt]="uiText.clock.logoAlt" />
      <span class="clock-brand__title">{{uiText.app.brandTitle}}</span>
    </div>
  </div>
  <div class="clock-layout">
    <div class="clock-stack-wrap">
      <div class="analysis-meter" [attr.aria-label]="'Analysis meter'">
        <span class="analysis-meter__side analysis-meter__side--top">{{uiText.clock.black}}</span>
        <div class="analysis-meter__bar">
          <div class="analysis-meter__marker"
               [style.top.%]="analysisMeterOffsetPercent"
               [attr.title]="'SF ' + currentAnalysisEvalText"></div>
        </div>
        <span class="analysis-meter__side analysis-meter__side--bottom">{{uiText.clock.white}}</span>
        <span class="analysis-meter__value">
          <span class="analysis-meter__label">SF</span>
          <span class="analysis-meter__score">{{currentAnalysisEvalText}}</span>
        </span>
      </div>
      <div class="clock-stack">
        <div class="clock-display"
             [class.clock-display--active]="isBlackClockActive"
             [class.clock-display--low]="isBlackClockLow">
          <div class="clock-meta">
            <span class="clock-player">{{uiText.clock.black}}</span>
            <span class="clock-status" [class.clock-status--running]="isBlackClockActive"></span>
          </div>
          <span class="clock-time">{{formatPlayerClock(blackClockMs, false)}}</span>
        </div>
        <div class="clock-display"
             [class.clock-display--active]="isWhiteClockActive"
             [class.clock-display--low]="isWhiteClockLow">
          <div class="clock-meta">
            <span class="clock-player">{{uiText.clock.white}}</span>
            <span class="clock-status" [class.clock-status--running]="isWhiteClockActive"></span>
          </div>
          <span class="clock-time">{{formatPlayerClock(whiteClockMs, whiteHasInfiniteTime)}}</span>
        </div>
      </div>
    </div>

    <div class="clock-controls">
      <div class="handicap-group">
        <p class="controls-label">Handicap</p>
        <div class="handicap-grid">
        <button
          *ngFor="let option of handicapOptions"
          class="time-btn handicap-btn"
          [class.time-btn--selected]="selectedHandicap === option.value"
          (click)="onHandicapSelect(option.value)">
          {{option.label}}
        </button>
        </div>
      </div>
      <div class="clock-controls-grid">
        <button class="time-btn"
          [disabled]="clockStarted"
          [class.time-btn--selected]="selectedClockPresetLabel === '1+0'"
          (click)="onPreset(1, 0, '1+0')">1+0</button>
        <button class="time-btn"
          [disabled]="clockStarted"
          [class.time-btn--selected]="selectedClockPresetLabel === '3+2'"
          (click)="onPreset(3, 2, '3+2')">3+2</button>
        <button class="action-btn action-btn--large" (click)="toggleClock.emit()">{{getClockButtonLabel()}}</button>
        <button class="time-btn"
          [disabled]="clockStarted"
          [class.time-btn--selected]="selectedClockPresetLabel === '5+0'"
          (click)="onPreset(5, 0, '5+0')">5+0</button>
        <button class="time-btn"
          [disabled]="clockStarted"
          [class.time-btn--selected]="selectedClockPresetLabel === '10+0'"
          (click)="onPreset(10, 0, '10+0')">10+0</button>
        <button class="action-btn action-btn--secondary action-btn--large" (click)="resetClock.emit()">{{uiText.clock.reset}}</button>
      </div>
    </div>
  </div>
</div>
