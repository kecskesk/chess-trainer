<div class="trainer-layout"
     [class.preview-mode]="previewMode"
     [style.--light-square-color]="lightSquareColor"
     [style.--dark-square-color]="darkSquareColor"
     [style.--white-piece-color]="whitePieceColor"
     [style.--black-piece-color]="blackPieceColor"
     [style.--square-gap]="squareGapPx + 'px'"
     [style.--board-border-width]="borderWidthPx + 'px'">
  <app-chess-board-language-tools
    *ngIf="!previewMode"
    [uiText]="uiText"
    [selectedLocale]="selectedLocale"
    [isLanguageSwitching]="isLanguageSwitching"
    (localeChange)="switchLocale($event)"></app-chess-board-language-tools>
  <div class="ambient-math" *ngIf="!previewMode" [ngClass]="getAmbientThemeClass()" [ngStyle]="ambientStyle" aria-hidden="true"></div>
  <section class="board-panel">
    <div class="board-stack">
          <div class="outer-container board-shell">
        <div class="container" #chessField>
          <div #row class="field-row" *ngFor="let displayRow of renderedBoardRows">
            <div class="field-cell" *ngFor="let displayCol of renderedBoardCols">
              <div class="piece-box">
                <div class="square"
                     cdkDropList
                     cdkDropListOrientation="horizontal"
                     [cdkDropListSortingDisabled]="true"
                     [cdkDropListEnterPredicate]="canDropPredicate"
                     [cdkDropListDisabled]="previewMode"
                     [id]="getDisplayFieldId(displayRow, displayCol)"
                     [ngClass]="getDisplaySquareHighlightClass(displayRow, displayCol)"
                     [cdkDropListData]="getDisplayCell(displayRow, displayCol)"
                     [cdkDropListConnectedTo]="dropLists"
                     (cdkDropListEntered)="onDropListEntered($event)"
                     (cdkDropListDropped)="onDrop($event)"
                     [class.white-square]="isDisplaySquareWhite(displayRow, displayCol)"
                     [class.black-square]="!isDisplaySquareWhite(displayRow, displayCol)">
                  <div class="drag-box" (mousedown)="onSquarePointerDown(getDisplayCell(displayRow, displayCol))">
                    <app-chess-piece [piece]="piece"
                                     [pieceStyle]="pieceStyle"
                                     *ngIf="getDisplayPiece(displayRow, displayCol) as piece"
                                     cdkDrag
                                     [cdkDragData]="piece"
                                     [cdkDragDisabled]="previewMode || chessBoardStateService.boardHelper.gameOver || piece.color !== chessBoardStateService.boardHelper.colorTurn"
                                     (cdkDragStarted)="onDragStarted()"
                                     (cdkDragEnded)="onDragEnded()"></app-chess-piece>
                  </div>
                  <div class="notation">{{getDisplayNotation(displayRow, displayCol)}}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="arrowPointer" *ngFor="let arrow of chessBoardStateService.arrows; index as arrowIdx"
             [style.top]="getArrowTopForDisplay(arrow)" [style.left]="getArrowLeftForDisplay(arrow)" [style.color]="arrow.color"
             [style.width]="arrow.length"
             [style.--arrow-thickness]="arrow.thickness"
             [style.transform]="getArrowTransformForDisplay(arrow)">
          <span class="arrow-shaft"></span>
          <span class="arrow-head"></span>
        </div>
      </div>

      <app-chess-board-position-key
        *ngIf="!previewMode"
        [uiText]="uiText"
        [boardHelper]="chessBoardStateService.boardHelper"
        [isDebugPanelOpen]="isDebugPanelOpen"
        [debugPositionKey]="getDebugPositionKey()"
        (debugPanelToggle)="onDebugPanelToggle($event)"></app-chess-board-position-key>
    </div>
  </section>

  <section class="sidebar-panel" *ngIf="!previewMode">
    <app-chess-board-clock-card
      [uiText]="uiText"
      [selectedLocale]="selectedLocale"
      [chessColors]="chessColors"
      [selectedClockPresetLabel]="clockVm.selectedClockPresetLabel"
      [clockStarted]="clockVm.clockStarted"
      [clockRunning]="clockVm.clockRunning"
      [blackClockMs]="clockVm.blackClockMs"
      [whiteClockMs]="clockVm.whiteClockMs"
      [analysisMeterOffsetPercent]="clockVm.analysisMeterOffsetPercent"
      [currentAnalysisEvalText]="clockVm.currentAnalysisEvalText"
      [isBlackClockActive]="clockVm.isBlackClockActive"
      [isWhiteClockActive]="clockVm.isWhiteClockActive"
      [isBlackClockLow]="clockVm.isBlackClockLow"
      [isWhiteClockLow]="clockVm.isWhiteClockLow"
      (timeControlChange)="applyTimeControl($event.baseMinutes, $event.incrementSeconds, $event.label)"
      (toggleClock)="startOrPauseClock()"
      (resetClock)="resetClock()"></app-chess-board-clock-card>

    <app-chess-board-status-card
      [uiText]="uiText"
      [selectedLocale]="selectedLocale"
      [boardState]="statusVm.boardState"
      [pendingDrawOfferBy]="statusVm.pendingDrawOfferBy"
      [clockRunning]="statusVm.clockRunning"
      [resignConfirmColor]="statusVm.resignConfirmColor"
      [chessColors]="chessColors"
      [canOfferDraw]="statusVm.canOfferDraw"
      [canRespondToDrawOffer]="statusVm.canRespondToDrawOffer"
      [canClaimDraw]="statusVm.canClaimDraw"
      [canResignWhite]="statusVm.canResignWhite"
      [canResignBlack]="statusVm.canResignBlack"
      (showPossibleMoves)="showPossibleMoves($event)"
      (startNewGame)="startNewGame()"
      (offerDraw)="offerDraw()"
      (acceptDraw)="acceptDrawOffer()"
      (declineDraw)="declineDrawOffer()"
      (claimDraw)="claimDraw()"
      (openResignConfirm)="openResignConfirm($event)"
      (cancelResignConfirm)="cancelResignConfirm()"
      (confirmResign)="confirmResign()"></app-chess-board-status-card>

    <app-chess-board-tools-card
      [uiText]="uiText"
      [activeTool]="toolsVm.activeTool"
      [isBoardFlipped]="toolsVm.isBoardFlipped"
      [canPromote]="toolsVm.canPromote"
      [suggestedMoves]="toolsVm.suggestedMoves"
      [suggestedMoveQualityByMove]="toolsVm.suggestedMoveQualityByMove"
      [suggestedMoveEvalByMove]="toolsVm.suggestedMoveEvalByMove"
      [openingRecognition]="toolsVm.openingRecognition"
      [endgameRecognition]="toolsVm.endgameRecognition"
      (promotePiece)="promotePiece($event)"
      (showThreats)="showThreats($event)"
      (showProtected)="showProtected($event)"
      (showHangingPieces)="showHangingPieces($event)"
      (showForkIdeas)="showForkIdeas()"
      (showPinIdeas)="showPinIdeas()"
      (toggleBoardFlip)="toggleBoardFlip()"
      (exportPgn)="exportPgn()"
      (exportBoardImage)="exportBoardImageMock()"
      (exportFen)="exportFen()"
      (previewMove)="previewSuggestedMoveArrows($event)"
      (clearPreview)="clearSuggestedMoveArrows()"></app-chess-board-tools-card>

    <app-chess-board-history-card
      #historyLog
      [uiText]="uiText"
      [canUndo]="historyVm.canUndo"
      [canRedo]="historyVm.canRedo"
      [visibleHistory]="historyVm.visibleHistory"
      [evaluations]="historyVm.evaluations"
      [pendingEvaluationPlaceholder]="historyVm.pendingEvaluationPlaceholder"
      [evaluationErrorPlaceholder]="historyVm.evaluationErrorPlaceholder"
      [naPlaceholder]="historyVm.naPlaceholder"
      [analysisClampPawns]="historyVm.analysisClampPawns"
      (undo)="undoMove()"
      (redo)="redoMove()"></app-chess-board-history-card>

    <app-chess-board-cct-card
      [uiText]="uiText"
      [captures]="cctVm.captures"
      [checks]="cctVm.checks"
      [threats]="cctVm.threats"
      [moveQualityByMove]="cctVm.moveQualityByMove"
      [moveEvalByMove]="cctVm.moveEvalByMove"
      (previewMove)="previewSuggestedMoveArrows($event)"
      (clearPreview)="clearSuggestedMoveArrows()"></app-chess-board-cct-card>
  </section>
</div>
