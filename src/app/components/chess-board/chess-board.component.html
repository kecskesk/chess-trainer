<div class="trainer-layout"
     [class.preview-mode]="previewMode"
     [style.--light-square-color]="lightSquareColor"
     [style.--dark-square-color]="darkSquareColor"
     [style.--white-piece-color]="whitePieceColor"
     [style.--black-piece-color]="blackPieceColor"
     [style.--square-gap]="squareGapPx + 'px'"
     [style.--board-border-width]="borderWidthPx + 'px'">
  <app-chess-board-language-tools
    *ngIf="!previewMode"
    [uiText]="uiText"
    [selectedLocale]="selectedLocale"
    [isLanguageSwitching]="isLanguageSwitching"
    (localeChange)="switchLocale($event)"></app-chess-board-language-tools>
  <div class="ambient-math" *ngIf="!previewMode" [ngClass]="getAmbientThemeClass()" [ngStyle]="ambientStyle" aria-hidden="true"></div>
  <section class="board-panel">
    <div class="board-stack">
      <div class="outer-container board-shell">
        <div class="container" #chessField>
          <app-chess-board-grid
            [renderedBoardRows]="renderedBoardRows"
            [renderedBoardCols]="renderedBoardCols"
            [field]="chessBoardStateService.field"
            [boardHighlights]="chessBoardStateService.boardHighlights"
            [arrows]="chessBoardStateService.arrows"
            [mateInOneTargets]="mateInOneTargets"
            [mateInOneBlunderTargets]="mateInOneBlunderTargets"
            [isBoardFlipped]="isBoardFlipped"
            [previewMode]="previewMode"
            [previewPreset]="previewPreset"
            [pieceStyle]="pieceStyle"
            [gameOver]="chessBoardStateService.boardHelper.gameOver"
            [turnColor]="chessBoardStateService.boardHelper.colorTurn"
            [canDropPredicate]="canDropPredicate"
            (dropListEntered)="onDropListEntered($event)"
            (pieceDropped)="onDrop($event)"
            (dragStarted)="onDragStarted()"
            (dragEnded)="onDragEnded()"
            (squarePointerDown)="onSquarePointerDown($event)"></app-chess-board-grid>
        </div>
      </div>

      <app-chess-board-position-key
        *ngIf="!previewMode"
        [uiText]="uiText"
        [boardHelper]="chessBoardStateService.boardHelper"
        [isDebugPanelOpen]="isDebugPanelOpen"
        [debugPositionKey]="getDebugPositionKey()"
        (debugPanelToggle)="onDebugPanelToggle($event)"></app-chess-board-position-key>
    </div>
  </section>

  <section class="sidebar-panel" *ngIf="!previewMode">
    <app-chess-board-clock-card
      [uiText]="uiText"
      [selectedLocale]="selectedLocale"
      [chessColors]="chessColors"
      [selectedClockPresetLabel]="selectedClockPresetLabel"
      [clockStarted]="clockStarted"
      [clockRunning]="clockRunning"
      [blackClockMs]="blackClockMs"
      [whiteClockMs]="whiteClockMs"
      [analysisMeterOffsetPercent]="getAnalysisMeterOffsetPercent()"
      [currentAnalysisEvalText]="getCurrentAnalysisEvalText()"
      [turnColor]="chessBoardStateService.boardHelper.colorTurn"
      [isGameOver]="chessBoardStateService.boardHelper.gameOver"
      (timeControlChange)="applyTimeControl($event.baseMinutes, $event.incrementSeconds, $event.label)"
      (toggleClock)="startOrPauseClock()"
      (resetClock)="resetClock()"></app-chess-board-clock-card>

    <app-chess-board-status-card
      [uiText]="uiText"
      [selectedLocale]="selectedLocale"
      [boardState]="chessBoardStateService.boardHelper"
      [pendingDrawOfferBy]="pendingDrawOfferBy"
      [clockRunning]="clockRunning"
      [resignConfirmColor]="resignConfirmColor"
      [chessColors]="chessColors"
      [canClaimDraw]="canClaimDraw()"
      (showPossibleMoves)="showPossibleMoves($event)"
      (startNewGame)="startNewGame()"
      (offerDraw)="offerDraw()"
      (acceptDraw)="acceptDrawOffer()"
      (declineDraw)="declineDrawOffer()"
      (claimDraw)="claimDraw()"
      (openResignConfirm)="openResignConfirm($event)"
      (cancelResignConfirm)="cancelResignConfirm()"
      (confirmResign)="confirmResign()"></app-chess-board-status-card>

    <app-chess-board-tools-card
      [uiText]="uiText"
      [activeTool]="activeTool"
      [isBoardFlipped]="isBoardFlipped"
      [canPromote]="chessBoardStateService.boardHelper.canPromote !== null"
      [suggestedMoves]="suggestedMoves"
      [suggestedMoveQualityByMove]="suggestionQualityByMoveMap"
      [suggestedMoveEvalByMove]="suggestionEvalTextByMoveMap"
      [openingRecognition]="getMockOpeningRecognition()"
      [endgameRecognition]="getMockEndgameRecognition()"
      (promotePiece)="promotePiece($event)"
      (showThreats)="showThreats($event)"
      (showProtected)="showProtected($event)"
      (showHangingPieces)="showHangingPieces($event)"
      (showForkIdeas)="showForkIdeas()"
      (showPinIdeas)="showPinIdeas()"
      (toggleBoardFlip)="toggleBoardFlip()"
      (exportPgn)="exportPgn()"
      (exportBoardImage)="exportBoardImageMock()"
      (exportFen)="exportFen()"
      (previewMove)="previewSuggestedMoveArrows($event)"
      (clearPreview)="clearSuggestedMoveArrows()"></app-chess-board-tools-card>

    <app-chess-board-history-card
      #historyLog
      [uiText]="uiText"
      [history]="chessBoardStateService.history"
      [historyCursor]="mockHistoryCursor"
      [maxMoveIndex]="getHistoryMaxMoveIndex()"
      [evaluations]="allHistoryEvaluations"
      [pendingEvaluationPlaceholder]="pendingEvaluationPlaceholderText"
      [evaluationErrorPlaceholder]="evaluationErrorPlaceholderText"
      [naPlaceholder]="naPlaceholderText"
      [analysisClampPawns]="analysisClampPawnsLimit"
      (undo)="undoMove()"
      (redo)="redoMove()"></app-chess-board-history-card>

    <app-chess-board-cct-card
      [uiText]="uiText"
      [captures]="getCctRecommendations(cctCategory.Captures)"
      [checks]="getCctRecommendations(cctCategory.Checks)"
      [threats]="getCctRecommendations(cctCategory.Threats)"
      [moveQualityByMove]="suggestionQualityByMoveMap"
      [moveEvalByMove]="suggestionEvalTextByMoveMap"
      (previewMove)="previewSuggestedMoveArrows($event)"
      (clearPreview)="clearSuggestedMoveArrows()"></app-chess-board-cct-card>
  </section>
</div>
